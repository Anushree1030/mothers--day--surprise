<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Mother's Day 💖</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="hearts"></div>

<div class="intro" id="intro">

  <h1>Happy Mother's Day 🌸</h1>

  <p>
    A tiny surprise made with love 💖
  </p>

  <button onclick="openMain()">
    Tap To Open ✨
  </button>

</div>

<div class="main hidden" id="main">

  <div class="card">

    <div class="flower">
      🌸
    </div>

    <h2>
      To The Best Mumma 💕
    </h2>

    <p class="line">
      You make every ordinary moment magical ✨
    </p>

    <div class="gift" onclick="showPhoto()">
      🎁
    </div>

    <p class="tap-text">
      Tap the Gift 🎀
    </p>

    <div class="photo-section hidden" id="photoSection">

      <img src="mumma.jpg" class="photo">

      <div class="message">

        Thank you for always supporting me 💖
        <br><br>

        This tiny coding surprise
        is specially made for you 🌷

      </div>

    </div>

    <div class="footer">
      Made with love by your engineer daughter 💻✨
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
